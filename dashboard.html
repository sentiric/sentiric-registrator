<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sentiric Live Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-dot { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-300 font-mono">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0d1117]/90 backdrop-blur sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold text-emerald-500 tracking-tighter">📡 SENTIRIC <span class="text-slate-500">REGISTRATOR</span></h1>
            <p class="text-[10px] text-slate-600 mt-1 uppercase tracking-widest">Service Discovery Engine v1.3.0</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="sync-status" class="text-[10px] text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">SYNC: OK</div>
            <div class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                <div class="w-2 h-2 bg-emerald-500 rounded-full live-dot"></div>
                <span class="text-[10px] font-bold text-emerald-500 uppercase">Live Pulse</span>
            </div>
        </div>
    </nav>

    <main class="p-8 max-w-6xl mx-auto">
        <div id="container-list" class="grid gap-4">
            <div class="text-center p-20 text-slate-700 animate-pulse italic">Docker Socket taranıyor...</div>
        </div>
    </main>

    <script>
        async function update() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const list = document.getElementById('container-list');
                
                if (data.length === 0) {
                    list.innerHTML = '<div class="text-center p-20 border border-dashed border-slate-800 rounded-3xl text-slate-600">Bu host üzerinde kayıtlı servis bulunamadı.</div>';
                    return;
                }

                list.innerHTML = data.map(s => `
                    <div class="bg-[#151921] border border-slate-800 p-5 rounded-2xl flex justify-between items-center hover:border-emerald-500/40 transition-all shadow-xl group">
                        <div class="flex gap-5 items-center">
                            <div class="w-12 h-12 bg-emerald-500/5 rounded-2xl flex items-center justify-center text-emerald-500 border border-emerald-500/10 group-hover:bg-emerald-500 group-hover:text-black transition-all">
                                <span class="text-xl font-black">${s.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div>
                                <div class="text-lg font-bold text-slate-200">${s.name}</div>
                                <div class="text-[10px] font-mono text-slate-600 mt-1">${s.id}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-slate-400 group-hover:text-white transition-colors tracking-tighter">:${s.port}</div>
                            <div class="text-[9px] text-slate-600 mt-1 font-bold uppercase tracking-widest">${s.proto} / HEALTH: OK</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error("Pulse error:", e); }
        }
        setInterval(update, 2000); update();
    </script>
</body>
</html>
