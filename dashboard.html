<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentiric Live Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-indicator { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-mono">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-emerald-400">📡 SENTIRIC <span class="text-slate-400">REGISTRATOR</span></h1>
        <div class="flex items-center gap-3">
            <span id="node-name" class="text-xs text-slate-500 border border-slate-700 px-2 py-1 rounded">HOST: ...</span>
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full">
                <div class="w-2 h-2 bg-emerald-500 rounded-full live-indicator"></div>
                <span class="text-[10px] font-bold tracking-widest">LIVE PULSE</span>
            </div>
        </div>
    </nav>

    <main class="p-8 max-w-5xl mx-auto">
        <div class="mb-6 flex justify-between items-end">
            <h2 class="text-slate-400 text-sm font-bold uppercase tracking-tighter">Active Registrations</h2>
            <span id="service-count" class="text-emerald-500 text-xs font-bold">0 Services Found</span>
        </div>
        
        <div class="grid gap-4" id="container-list">
            <!-- Services will be injected here -->
            <div class="animate-pulse text-slate-600">Scanning docker sockets...</div>
        </div>
    </main>

    <script>
        async function update() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const list = document.getElementById('container-list');
                const count = document.getElementById('service-count');
                
                const services = Object.values(data);
                count.innerText = `${services.length} Services Registered`;
                
                if (services.length === 0) {
                    list.innerHTML = '<div class="bg-slate-800/50 border border-dashed border-slate-700 p-12 rounded-xl text-center text-slate-500">No active registrations found on this node.</div>';
                    return;
                }

                list.innerHTML = '';
                services.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'group bg-slate-800 hover:bg-slate-750 border border-slate-700 p-5 rounded-xl transition-all flex justify-between items-center shadow-lg';
                    card.innerHTML = `
                        <div class="flex gap-4 items-center">
                            <div class="w-10 h-10 bg-emerald-500/10 rounded-lg flex items-center justify-center text-emerald-500 font-bold">
                                ${s.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="text-emerald-400 font-bold text-lg leading-none mb-1">${s.name}</div>
                                <div class="text-[10px] text-slate-500 font-light truncate max-w-xs">${s.id}</div>
                                <div class="flex gap-2 mt-2">
                                    <span class="text-[9px] bg-slate-900 text-slate-400 px-2 py-0.5 rounded border border-slate-700">${s.image}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-slate-200 tracking-tighter">:${s.port}</div>
                            <div class="text-[9px] text-emerald-600 font-bold uppercase">TCP Active</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                console.error("Pulse update failed", e);
            }
        }
        setInterval(update, 2000); 
        update();
    </script>
</body>
</html>
