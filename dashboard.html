<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sentiric Live Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-[#0a0c10] text-slate-300 font-mono">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0d1117]/80 backdrop-blur-md sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold text-emerald-500 tracking-tighter">📡 SENTIRIC <span class="text-slate-500">REGISTRATOR</span></h1>
            <p class="text-[10px] text-slate-500 mt-1">v1.2.5 • AUTO-DISCOVERY ENGINE</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="resync-timer" class="text-[10px] text-slate-600 bg-slate-900 px-2 py-1 rounded">RESYNC: WAIT...</div>
            <div class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                <div class="w-2 h-2 bg-emerald-500 rounded-full live"></div>
                <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Live Pulse</span>
            </div>
        </div>
    </nav>

    <main class="p-8 max-w-6xl mx-auto">
        <div id="container-list" class="grid gap-4">
            <div class="text-center p-12 text-slate-600 animate-pulse">Docker Socket taranıyor...</div>
        </div>
    </main>

    <script>
        async function update() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const list = document.getElementById('container-list');
                
                if (data.length === 0) {
                    list.innerHTML = '<div class="text-center p-20 border border-dashed border-slate-800 rounded-2xl text-slate-600">Bu node üzerinde aktif kayıtlı servis bulunamadı.</div>';
                    return;
                }

                list.innerHTML = data.map(s => `
                    <div class="bg-[#161b22] border border-slate-800 hover:border-emerald-500/50 p-5 rounded-xl transition-all flex justify-between items-center shadow-2xl group">
                        <div class="flex gap-5 items-center">
                            <div class="w-12 h-12 bg-emerald-500/5 rounded-xl flex items-center justify-center text-emerald-500 border border-emerald-500/10 group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                <span class="text-xl font-black">${s.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div>
                                <div class="text-lg font-bold text-slate-200 group-hover:text-emerald-400 transition-colors">${s.name}</div>
                                <div class="text-[10px] font-mono text-slate-500 mt-1 uppercase tracking-tighter">${s.id}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-slate-400 group-hover:text-white transition-colors tracking-tighter">:${s.port}</div>
                            <div class="text-[9px] text-slate-600 mt-1 font-bold">TCP CHECK: <span class="text-emerald-500">ACTIVE</span></div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
        setInterval(update, 2000); update();
    </script>
</body>
</html>
