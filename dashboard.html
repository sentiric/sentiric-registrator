<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sentiric Node Observer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; font-family: monospace; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live { animation: pulse 2s infinite; }
    </style>
</head>
<body class="text-slate-300">
    <nav class="p-6 glass sticky top-0 z-50 flex justify-between items-center mb-8 shadow-2xl">
        <div>
            <h1 class="text-xl font-bold text-emerald-500 tracking-tighter">📡 SENTIRIC <span class="text-slate-500 text-sm italic">OBSERVER</span></h1>
            <div id="node-id" class="text-[10px] text-slate-500 uppercase mt-1">Host: Loading...</div>
        </div>
        <div class="flex gap-10 items-center">
            <div class="text-center">
                <div id="count-total" class="text-2xl font-bold text-white">0</div>
                <div class="text-[9px] uppercase text-slate-500">Kayıtlı Servis</div>
            </div>
            <div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                <div class="w-2 h-2 bg-emerald-500 rounded-full live"></div>
                <span class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase">Live Pulse</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-12 gap-6 pb-20">
        <!-- Aktivite Grafiği -->
        <div class="col-span-12 lg:col-span-4">
            <div class="glass p-6 rounded-3xl sticky top-32 shadow-xl">
                <h2 class="text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Node Aktivite (Son 60sn)</h2>
                <canvas id="activityChart" height="250"></canvas>
            </div>
        </div>

        <!-- Servis Listesi -->
        <div class="col-span-12 lg:col-span-8">
            <div id="service-list" class="grid gap-4">
                <div class="text-center p-20 text-slate-600 animate-pulse">Sinyaller bekleniyor...</div>
            </div>
        </div>
    </main>

    <script>
        let chart;
        function initChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(30).fill(''),
                    datasets: [{
                        label: 'Servis Sayısı',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#1c2128' } }, x: { display: false } }
                }
            });
        }

        async function update() {
            try {
                const res = await fetch('/api/status');
                const services = await res.json();
                
                // --- KATİ SIRALAMA (Zıplamayı Önler) ---
                services.sort((a, b) => a.name.localeCompare(b.name) || a.port - b.port);

                const list = document.getElementById('service-list');
                list.innerHTML = services.map(s => {
                    const isOk = s.status === 'passing';
                    return `
                        <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-4 ${isOk ? 'border-l-emerald-500' : 'border-l-red-500'} hover:translate-x-2 transition-transform duration-300">
                            <div class="flex gap-4 items-center">
                                <div class="w-10 h-10 rounded-xl bg-[#0d1117] flex items-center justify-center font-bold text-slate-500 border border-slate-800">
                                    ${s.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div class="text-base font-bold text-slate-100">${s.name}</div>
                                    <div class="text-[10px] font-mono text-slate-600 truncate max-w-[300px]">${s.id}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-slate-400 tracking-tighter">:${s.port}</div>
                                <div class="text-[9px] font-bold ${isOk ? 'text-emerald-500' : 'text-red-500'} uppercase">${s.status}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('count-total').innerText = services.length;
                if(services.length > 0) document.getElementById('node-id').innerText = `HOST: ${services[0].host}`;

                chart.data.datasets[0].data.push(services.length);
                if (chart.data.datasets[0].data.length > 30) chart.data.datasets[0].data.shift();
                chart.update('none');

            } catch (e) { console.error(e); }
        }

        initChart();
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
